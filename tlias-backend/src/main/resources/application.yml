server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/tlias?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:zzj000000}
    hikari:
      initialization-fail-timeout: -1
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  mapper-locations: classpath:mapper/*.xml

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

# JWT配置
jwt:
  secret: ${JWT_SECRET:tlias-jwt-secret-key-for-signing-token-must-be-long-enough}
  ttl: 7200000  # 2小时（毫秒）

# MinIO / Sealos OSS 配置（S3兼容对象存储）
minio:
  endpoint: ${MINIO_ENDPOINT:https://objectstorageapi.hzh.sealos.run}
  access-key: ${MINIO_ACCESS_KEY:e09w3hj8}
  secret-key: ${MINIO_SECRET_KEY:zbz7bt7httq975kr}
  bucket: ${MINIO_BUCKET:e09w3hj8-system}
