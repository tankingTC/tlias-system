version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: tlias
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../docs/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ../docs/operation_log.sql:/docker-entrypoint-initdb.d/operation_log.sql
    networks:
      - tlias-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - tlias-net

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tlias?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123456
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      - mysql
      - redis
    networks:
      - tlias-net

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - tlias-net

volumes:
  mysql-data:

networks:
  tlias-net:
    driver: bridge
